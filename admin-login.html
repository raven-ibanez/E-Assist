<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <span class="logo-icon">🏫</span>
        <div>
            <h1>School Enrollment System</h1>
            <p>Admin Access Only</p>
        </div>
    </nav>

    <div class="page" style="max-width: 440px;">

        <div class="steps">
            <a href="index.html">🏠 Home</a>
            <span>›</span>
            <span class="step-active">Admin Login</span>
        </div>

        <div class="card">
            <div style="text-align:center; margin-bottom: 24px;">
                <div style="font-size: 48px;">🔐</div>
                <div class="card-title">Admin Dashboard Login</div>
                <div class="card-subtitle">School staff only. Enter your credentials below.</div>
            </div>

            <!-- Error message -->
            <div id="alert" class="alert"></div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" id="loginBtn" class="btn btn-primary btn-full" style="margin-top: 8px;">
                    Login to Dashboard
                </button>
            </form>

            <div style="text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray-500);">
                <a href="index.html" style="color: var(--blue-dark);">← Back to Home</a>
            </div>
        </div>

    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideAlert('alert');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            setLoading('loginBtn', true, 'Login to Dashboard');

            try {
                // POST credentials to the backend
                await apiPost('api/admin.php?action=login', { username, password });

                // Save a simple session flag in sessionStorage
                // (only lasts while the browser tab is open)
                sessionStorage.setItem('adminLoggedIn', 'yes');
                sessionStorage.setItem('adminUser', username);

                // Redirect to admin dashboard
                window.location.href = 'admin-dashboard.html';

            } catch (err) {
                showAlert('alert', '❌ ' + err.message);
                setLoading('loginBtn', false, 'Login to Dashboard');
            }
        });
    </script>
</body>

</html>
