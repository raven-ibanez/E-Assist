<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Successful — Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="biodata-page">

    <div class="page" style="text-align: center;">
        
        <!-- Header -->
        <div class="biodata-header">
            <a href="index.html" class="biodata-back-link">
                <svg viewBox="0 0 24 24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
                </svg>
                Back to Home
            </a>
            <div class="biodata-logo"
                style="display:flex;align-items:center;justify-content:center;font-size:32px;background:#fff;">🏫</div>
            <h1>ENROLLMENT FORM</h1>
            <p>Nursery to Grade 6</p>
        </div>

        <!-- Submission Card -->
        <div class="submission-card">
            <div class="submission-icon-wrapper">
                <div class="submission-icon-doc">
                    <div style="height: 4px; width: 40px; background: #9ca3af; margin: 4px 0;"></div>
                    <div style="height: 4px; width: 40px; background: #9ca3af; margin: 4px 0;"></div>
                    <div style="height: 4px; width: 20px; background: #9ca3af; margin: 4px 0;"></div>
                </div>
                <div class="submission-icon-check">✓</div>
            </div>
            <div class="submission-content">
                <h2>Your Enrollment Application has been Submitted</h2>
                <p>Please check your email for further notice.</p>
                <p style="font-size: 16px; opacity: 0.8; margin-top: 8px;">Please tune in to the school’s facebook page for announcements</p>
            </div>
        </div>

        <!-- Help Footer -->
        <div class="success-help-footer">
            Need help? Contact us at the school office or visit our <a href="#" class="facebook-link">Facebook page</a>.
        </div>

    </div>

    <script>
        // Data logic remains for potential use, though not displayed in this simplified UI
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || 'Student';
        const studentId = params.get('id') || '----';
        console.log("Registered:", name, studentId);
        
        // Clear enrollment data from sessionStorage now that it's submitted
        sessionStorage.removeItem('enroll_data');
    </script>
</body>

</html>
