<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Enrollment Progress — Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <span class="logo-icon">🏫</span>
        <div>
            <h1>School Enrollment System</h1>
            <p>Kinder to Grade 6 Enrollment Portal</p>
        </div>
    </nav>

    <div class="page" style="max-width: 520px;">

        <div class="steps">
            <a href="index.html">🏠 Home</a>
            <span>›</span>
            <span class="step-active">Check Your Progress</span>
        </div>

        <!-- Login form to verify identity -->
        <div class="card">
            <div style="text-align:center; margin-bottom: 24px;">
                <div style="font-size: 48px;">🔍</div>
                <div class="card-title">Check Enrollment Status</div>
                <div class="card-subtitle">
                    Enter the email and password you used when you registered.
                </div>
            </div>

            <div id="alert" class="alert"></div>

            <form id="progressForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email" required
                        autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" id="checkBtn" class="btn btn-primary btn-full">
                    Check My Status
                </button>
            </form>

            <div style="text-align:center; margin-top:20px; font-size:13px; color:var(--gray-500);">
                Not yet registered?
                <a href="biodata.html" style="color:var(--blue-dark); font-weight:600;">Register here</a>
            </div>
        </div>

        <!-- ===== RESULT CARD (hidden until data is fetched) ===== -->
        <div class="result-card" id="resultCard">

            <!-- Big status icon changes based on status -->
            <div class="status-big" id="statusIcon">⏳</div>
            <h3 id="studentName">—</h3>
            <div class="status-label" id="statusLabel">—</div>

            <!-- Detailed info grid -->
            <div class="info-grid" style="margin-top: 20px;">
                <div class="info-item">
                    <label>Student ID</label>
                    <span id="resultStudentId">—</span>
                </div>
                <div class="info-item">
                    <label>Grade Level</label>
                    <span id="resultGrade">—</span>
                </div>
                <div class="info-item">
                    <label>Parent / Guardian</label>
                    <span id="resultParent">—</span>
                </div>
                <div class="info-item">
                    <label>Date Applied</label>
                    <span id="resultDate">—</span>
                </div>
            </div>

            <!-- What-to-do-next message based on status -->
            <div id="nextStepMessage" style="
                margin-top: 20px;
                padding: 14px;
                border-radius: 8px;
                font-size: 14px;
                line-height: 1.6;
            "></div>

        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('progressForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideAlert('alert');

            // Hide any previous result
            document.getElementById('resultCard').style.display = 'none';

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            setLoading('checkBtn', true, 'Check My Status');

            try {
                // Ask the server for this student's enrollment record
                const student = await apiPost('api/progress.php', { email, password });

                // Show the result card
                displayResult(student);

            } catch (err) {
                showAlert('alert', '❌ ' + err.message);
            } finally {
                setLoading('checkBtn', false, 'Check My Status');
            }
        });

        // ===== Display the fetched result =====
        function displayResult(student) {
            // Format the date nicely
            const dateApplied = new Date(student.applied_at).toLocaleDateString('en-PH', {
                year: 'numeric', month: 'long', day: 'numeric'
            });

            // Fill in the fields
            document.getElementById('studentName').textContent = `${student.first_name} ${student.last_name}`;
            document.getElementById('resultStudentId').textContent = student.student_no;
            document.getElementById('resultGrade').textContent = student.grade_level;
            document.getElementById('resultParent').textContent = student.parent_name;
            document.getElementById('resultDate').textContent = dateApplied;

            // Change status icon, label, and message based on status
            const statusIcon = document.getElementById('statusIcon');
            const statusLabel = document.getElementById('statusLabel');
            const nextStep = document.getElementById('nextStepMessage');
            const resultCard = document.getElementById('resultCard');

            if (student.status === 'Pending') {
                statusIcon.textContent = '⏳';
                statusLabel.innerHTML = '<span class="badge badge-pending">PENDING</span>';
                nextStep.style.background = '#fef3c7';
                nextStep.style.color = '#92400e';
                nextStep.textContent = '📌 Your application is still being reviewed by the school admin. Please check again in a few days.';

            } else if (student.status === 'Approved') {
                statusIcon.textContent = '🎉';
                statusLabel.innerHTML = '<span class="badge badge-approved">APPROVED</span>';
                nextStep.style.background = '#d1fae5';
                nextStep.style.color = '#065f46';
                nextStep.textContent = '✅ Congratulations! Your child has been approved for enrollment. Please visit the school to complete the requirements.';

            } else if (student.status === 'Rejected') {
                statusIcon.textContent = '❌';
                statusLabel.innerHTML = '<span class="badge badge-rejected">REJECTED</span>';
                nextStep.style.background = '#fee2e2';
                nextStep.style.color = '#991b1b';
                nextStep.textContent = '❗ Unfortunately, the application was not approved. Please contact the school for more information.';
            }

            // Show the result card with a smooth animation
            resultCard.style.display = 'block';
            resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>

</html>
