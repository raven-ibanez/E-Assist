<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Dashboard — Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="navbar">
        <span class="logo-icon">🏫</span>
        <div>
            <h1>Registrar Dashboard</h1>
            <p id="registrarUserLabel">Enrollment Management</p>
        </div>
        <!-- Logout button on the right side -->
        <button onclick="logout()" style="margin-left:auto; background:#fff2; border:none; color:white;
                       padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px;">
            🚪 Logout
        </button>
    </nav>

    <div class="page-wide">

        <!-- Stats Summary -->
        <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); gap:16px; margin-bottom:28px;">
            <div class="card" style="text-align:center; padding:20px;">
                <div style="font-size:32px; font-weight:700; color:var(--blue-dark);" id="totalCount">0</div>
                <div style="font-size:13px; color:var(--gray-500);">Total Applications</div>
            </div>
        </div>

        <div class="card">
            <div
                style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px;">
                <div>
                    <div class="card-title">📋 Student Enrollment Applications</div>
                    <div class="card-subtitle" style="margin-bottom:0;">
                        View all enrollment applications.
                    </div>
                </div>
            </div>

            <div id="alert" class="alert"></div>

            <!-- Students Table -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Grade Level</th>
                            <th>Parent</th>
                            <th>Contact</th>
                            <th>Date Applied</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <!-- Rows are added here by JavaScript -->
                        <tr>
                            <td colspan="7" style="text-align:center; color:var(--gray-500); padding:40px;">
                                ⏳ Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== MODAL: View Full Student Details ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3>🧒 Student Full Details</h3>
            <div id="modalContent" class="info-grid">
                <!-- Filled by JS when registrar clicks "View" -->
            </div>
            <div style="margin-top:24px; text-align:right;">
                <button class="btn btn-outline" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        /*
         * ============================================================
         *  REGISTRAR DASHBOARD — JAVASCRIPT
         * ============================================================
         *  WHAT THIS DOES:
         *  - Checks if the user is logged in (auth guard)
         *  - Loads all student enrollment data from the server
         *  - Displays students in a table with status badges
         *  - Lets the registrar Approve or Reject students
         *  - Shows full student details in a popup modal
         * ============================================================
         */

        // This array holds all student data loaded from the server
        let allStudents = [];

        // --- AUTH GUARD: If not logged in, redirect to login page ---
        if (!sessionStorage.getItem('registrarLoggedIn')) {
            window.location.href = 'employee-login.html';
        }

        // Show the logged-in username in the header
        const registrarUser = sessionStorage.getItem('registrarUser') || 'Registrar';
        document.getElementById('registrarUserLabel').textContent = `Logged in as: ${registrarUser}`;

        // --- Load all students from the database ---
        async function loadStudents() {
            try {
                allStudents = await apiGet('api/registrar.php?action=students');
                updateStats(allStudents);
                renderTable(allStudents);
            } catch (err) {
                showAlert('alert', '❌ Failed to load students: ' + err.message);
            }
        }

        // --- Update the total count ---
        function updateStats(students) {
            document.getElementById('totalCount').textContent = students.length;
        }

        // --- Render the student table ---
        function renderTable(students) {
            const tbody = document.getElementById('studentsTableBody');

            if (students.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;color:var(--gray-500);padding:40px;">
                    No students found.</td></tr>`;
                return;
            }

            // Build one table row per student
            tbody.innerHTML = students.map(s => `
                <tr>
                    <td><strong>${s.student_no}</strong></td>
                    <td>${s.last_name}, ${s.first_name}</td>
                    <td>${s.grade_level}</td>
                    <td>${s.parent_name}</td>
                    <td>${s.parent_contact}</td>
                    <td>${formatDate(s.applied_at)}</td>
                    <td>
                        <button class="btn" style="padding:6px 12px;font-size:12px;background:var(--gray-100);color:var(--gray-700);"
                                onclick="viewStudent(${s.enrollment_id})">
                            👁 View
                        </button>
                    </td>
                </tr>
            `).join('');
        }


        // --- View full student details in a popup modal ---
        async function viewStudent(id) {
            try {
                const s = await apiGet(`api/registrar.php?action=detail&id=${id}`);
                document.getElementById('modalContent').innerHTML = `
                    <div style="grid-column:1/-1;font-size:13px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--blue-light);padding-bottom:6px;margin-bottom:4px;">Student Information</div>
                    <div class="info-item"><label>Student ID</label><span>${s.student_no}</span></div>
                    <div class="info-item"><label>Full Name</label><span>${s.first_name} ${s.last_name}</span></div>
                    <div class="info-item"><label>Date of Birth</label><span>${s.birth_date}</span></div>
                    <div class="info-item"><label>Gender</label><span>${s.gender}</span></div>
                    <div class="info-item"><label>Grade Level</label><span>${s.grade_level}</span></div>
                    <div class="info-item"><label>Address</label><span>${s.address}</span></div>
                    <div class="info-item"><label>Previous School</label><span>${s.previous_school || '—'}</span></div>
                    <div class="info-item"><label>Session Preference</label><span>${s.session_preference || '—'}</span></div>

                    <div style="grid-column:1/-1;font-size:13px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--blue-light);padding-bottom:6px;margin-top:12px;margin-bottom:4px;">Parent / Guardian</div>
                    <div class="info-item"><label>Full Name</label><span>${s.parent_name}</span></div>
                    <div class="info-item"><label>Relationship</label><span>${s.parent_relation}</span></div>
                    <div class="info-item"><label>Contact Number</label><span>${s.parent_contact}</span></div>
                    <div class="info-item"><label>Email</label><span>${s.email}</span></div>
                    <div class="info-item"><label>Occupation</label><span>${s.occupation || '—'}</span></div>
                    <div class="info-item"><label>Monthly Income</label><span>${s.monthly_income || '—'}</span></div>

                    <div style="grid-column:1/-1;font-size:13px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--blue-light);padding-bottom:6px;margin-top:12px;margin-bottom:4px;">Documents</div>
                    <div class="info-item"><label>PSA Birth Certificate</label><span>${s.psa_birth_cert ? '✅ Uploaded' : '❌ Not uploaded'}</span></div>
                    <div class="info-item"><label>SF10 / Form 137</label><span>${s.sf10_document ? '✅ Uploaded' : '❌ Not uploaded'}</span></div>

                    <div style="grid-column:1/-1;font-size:13px;font-weight:700;color:var(--blue-dark);text-transform:uppercase;letter-spacing:0.5px;border-bottom:2px solid var(--blue-light);padding-bottom:6px;margin-top:12px;margin-bottom:4px;">Enrollment Info</div>
                    <div class="info-item"><label>Date Applied</label><span>${formatDate(s.applied_at)}</span></div>
                `;
                document.getElementById('modalOverlay').classList.add('active');
            } catch (err) {
                showAlert('alert', '❌ Could not load student details.');
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // --- Logout: clear session and go to login page ---
        function logout() {
            sessionStorage.removeItem('registrarLoggedIn');
            sessionStorage.removeItem('registrarUser');
            sessionStorage.removeItem('userRole');
            window.location.href = 'employee-login.html';
        }

        // --- Helper: format a date string nicely (e.g., "Mar 30, 2026") ---
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // Load student data when the page opens
        loadStudents();
    </script>
</body>

</html>
