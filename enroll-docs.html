<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3: Academic History — Enrollment System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="biodata-page">

    <div class="page">
        <!-- Header -->
        <div class="biodata-header">
            <a href="enroll-parent.html" class="biodata-back-link">
                <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                Back to Parent Info
            </a>
            <div class="biodata-logo" style="display:flex;align-items:center;justify-content:center;font-size:32px;background:#fff;">🏫</div>
            <h1>ENROLLMENT FORM</h1>
            <p>Academic History</p>
        </div>

        <!-- Step Tracker (4 Steps) -->
        <div class="step-tracker">
            <div class="step-item completed" id="step-1-indicator">
                <div class="step-number">1</div>
                <div class="step-label">Student</div>
            </div>
            <div class="step-item completed" id="step-2-indicator">
                <div class="step-number">2</div>
                <div class="step-label">Parent</div>
            </div>
            <div class="step-item active" id="step-3-indicator">
                <div class="step-number">3</div>
                <div class="step-label">Docs</div>
            </div>
            <div class="step-item" id="step-4-indicator">
                <div class="step-number">4</div>
                <div class="step-label">Payment</div>
            </div>
        </div>

        <!-- MODULE 3 Card -->
        <div class="biodata-card">
            <form id="step3Form">
                <div class="form-section">
                    <h3>3. Academic History</h3>
                    <p style="font-size: 13px; color: #666; margin-bottom: 20px;">Step 3 of 4: Tell us about your previous school (if any).</p>

                    <div class="form-group">
                        <label for="previous_school">Previous School Attended (If transferee)</label>
                        <input type="text" id="previous_school" name="previous_school" placeholder="Full name of previous school">
                    </div>

                    <div style="background: var(--blue-light); padding: 15px; border-radius: 8px; border-left: 4px solid var(--blue-dark); margin-top: 20px;">
                        <p style="font-size: 13px; color: var(--blue-dark); font-weight: 600;">Note: You will be asked to upload scans/photos of your PSA and SF10 on the final step.</p>
                    </div>
                </div>

                <div class="step-actions">
                    <button type="button" class="btn btn-prev" onclick="window.location.href='enroll-parent.html'">Back</button>
                    <button type="submit" class="btn btn-next">Next: Tuition & Payment</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        // Load previously saved data
        const savedData = JSON.parse(sessionStorage.getItem('enroll_data') || '{}');

        // If the user already entered a previous school, fill it in
        if (savedData.previous_school) {
            document.getElementById('previous_school').value = savedData.previous_school;
        }

        // --- When the form is submitted, save data and go to Step 4 (Payment) ---
        document.getElementById('step3Form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = JSON.parse(sessionStorage.getItem('enroll_data') || '{}');
            formData.forEach((value, key) => data[key] = value);
            sessionStorage.setItem('enroll_data', JSON.stringify(data));
            window.location.href = 'enroll-payment.html';
        });
    </script>
</body>
</html>
