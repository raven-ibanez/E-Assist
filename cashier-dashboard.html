<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashier Dashboard — Enrollment System</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Cashier-specific overrides */
        .cashier-navbar {
            background: linear-gradient(135deg, #1e40af, #3b82f6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            text-align: center;
            padding: 20px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 13px;
            color: var(--gray-500);
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            min-width: 200px;
        }

        .payment-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }

        .payment-badge-gcash {
            background: #dbeafe;
            color: #1e40af;
        }

        .payment-badge-maya {
            background: #e0e7ff;
            color: #3730a3;
        }

        .payment-badge-bank {
            background: #fef3c7;
            color: #92400e;
        }

        .payment-badge-none {
            background: var(--gray-100);
            color: var(--gray-500);
        }

        .ref-number {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700);
            background: var(--gray-50);
            padding: 3px 8px;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <nav class="navbar cashier-navbar">
        <span class="logo-icon">💰</span>
        <div>
            <h1>Cashier Dashboard</h1>
            <p id="cashierUserLabel">Payment Management</p>
        </div>
        <button onclick="logout()" style="margin-left:auto; background:#fff2; border:none; color:white;
                       padding:8px 16px; border-radius:8px; cursor:pointer; font-size:13px;">
            🚪 Logout
        </button>
    </nav>

    <div class="page-wide">



        <div class="card">
            <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:12px;">
                <div>
                    <div class="card-title">💳 Enrollee Payment Records</div>
                    <div class="card-subtitle" style="margin-bottom:0;">
                        View payment method, reference number, and enrollment status of each student.
                    </div>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Search by name, student ID, or reference number..." oninput="filterPayments()">
                <select id="filterPayment" onchange="filterPayments()"
                    style="padding:8px 14px; border:1.5px solid var(--gray-300); border-radius:8px; font-size:14px;">
                    <option value="All">All Payment Methods</option>
                    <option value="GCash">GCash</option>
                    <option value="Maya">Maya</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="None">No Payment</option>
                </select>
            </div>

            <div id="alert" class="alert"></div>

            <!-- Payments Table -->
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Student Name</th>
                            <th>Grade Level</th>
                            <th>Parent / Guardian</th>
                            <th>Contact</th>
                            <th>Payment Method</th>
                            <th>Reference No.</th>
                            <th>Date Applied</th>
                        </tr>
                    </thead>
                    <tbody id="paymentsTableBody">
                        <tr>
                            <td colspan="8" style="text-align:center; color:var(--gray-500); padding:40px;">
                                ⏳ Loading...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- ===== MODAL: View Payment Details ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h3>💳 Payment Details</h3>
            <div id="modalContent" class="info-grid">
                <!-- Filled by JS -->
            </div>
            <div style="margin-top:24px; text-align:right;">
                <button class="btn btn-outline" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
    <script>
        /*
         * ============================================================
         *  CASHIER DASHBOARD — JAVASCRIPT
         * ============================================================
         *  WHAT THIS DOES:
         *  - Checks if the user is logged in
         *  - Loads all payment records from the server
         *  - Displays them in a searchable, filterable table
         *  - Shows payment details in a popup modal
         * ============================================================
         */

        // This array holds all payment records from the server
        let allPayments = [];

        // --- AUTH GUARD: If not logged in, redirect to login page ---
        if (!sessionStorage.getItem('registrarLoggedIn')) {
            window.location.href = 'employee-login.html';
        }

        // Show the logged-in username in the header
        const cashierUser = sessionStorage.getItem('registrarUser') || 'Cashier';
        document.getElementById('cashierUserLabel').textContent = `Logged in as: ${cashierUser}`;

        // --- Load all payment records from the database ---
        async function loadPayments() {
            try {
                allPayments = await apiGet('api/registrar.php?action=payments');
                renderTable(allPayments);
            } catch (err) {
                showAlert('alert', '❌ Failed to load payments: ' + err.message);
            }
        }



        // --- Helper: creates a colored badge for the payment method ---
        function getPaymentBadge(method) {
            if (!method) return '<span class="payment-badge payment-badge-none">—</span>';
            const key = method.toLowerCase().replace(' ', '');
            const classMap = {
                'gcash': 'payment-badge-gcash',
                'maya': 'payment-badge-maya',
                'banktransfer': 'payment-badge-bank'
            };
            const cls = classMap[key] || 'payment-badge-none';
            return `<span class="payment-badge ${cls}">${method}</span>`;
        }

        // --- Render the payment table ---
        function renderTable(records) {
            const tbody = document.getElementById('paymentsTableBody');

            if (records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:var(--gray-500);padding:40px;">
                    No records found.</td></tr>`;
                return;
            }

            tbody.innerHTML = records.map(r => `
                <tr style="cursor:pointer;" onclick="viewPayment(${r.enrollment_id})">
                    <td><strong>${r.student_no}</strong></td>
                    <td>${r.last_name}, ${r.first_name}</td>
                    <td>${r.grade_level}</td>
                    <td>${r.parent_name}</td>
                    <td>${r.parent_contact || '—'}</td>
                    <td>${getPaymentBadge(r.payment_method)}</td>
                    <td>${r.reference_number ? `<span class="ref-number">${r.reference_number}</span>` : '<span style="color:var(--gray-500);">—</span>'}</td>
                    <td>${formatDate(r.applied_at)}</td>
                </tr>
            `).join('');
        }

        // --- Filter payments by search text, payment method, and status ---
        function filterPayments() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const payFilter = document.getElementById('filterPayment').value;

            let filtered = allPayments;

            // Text search
            if (search) {
                filtered = filtered.filter(r =>
                    (r.first_name + ' ' + r.last_name).toLowerCase().includes(search) ||
                    r.student_no.toLowerCase().includes(search) ||
                    (r.reference_number || '').toLowerCase().includes(search) ||
                    (r.parent_name || '').toLowerCase().includes(search)
                );
            }

            // Payment method filter
            if (payFilter !== 'All') {
                if (payFilter === 'None') {
                    filtered = filtered.filter(r => !r.payment_method);
                } else {
                    filtered = filtered.filter(r => r.payment_method === payFilter);
                }
            }



            renderTable(filtered);
        }

        // --- Show payment details in a popup modal ---
        function viewPayment(id) {
            const r = allPayments.find(p => p.enrollment_id == id);
            if (!r) return;

            document.getElementById('modalContent').innerHTML = `
                <div class="info-item"><label>Student ID</label><span>${r.student_no}</span></div>
                <div class="info-item"><label>Full Name</label><span>${r.first_name} ${r.last_name}</span></div>
                <div class="info-item"><label>Grade Level</label><span>${r.grade_level}</span></div>
                <div class="info-item"><label>Parent / Guardian</label><span>${r.parent_name}</span></div>
                <div class="info-item"><label>Contact</label><span>${r.parent_contact || '—'}</span></div>
                <div class="info-item"><label>Payment Method</label><span>${r.payment_method || 'Not provided'}</span></div>
                <div class="info-item"><label>Reference Number</label><span class="ref-number">${r.reference_number || '—'}</span></div>
                <div class="info-item"><label>Tuition Fee</label><span style="font-weight:700;color:var(--maroon-dark);">₱10,000</span></div>
                <div class="info-item"><label>Date Applied</label><span>${formatDate(r.applied_at)}</span></div>
            `;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // --- Logout: clear session and go to login page ---
        function logout() {
            sessionStorage.removeItem('registrarLoggedIn');
            sessionStorage.removeItem('registrarUser');
            sessionStorage.removeItem('userRole');
            window.location.href = 'employee-login.html';
        }

        // --- Helper: format a date string nicely ---
        function formatDate(dateStr) {
            if (!dateStr) return '—';
            const d = new Date(dateStr);
            return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // Load payment data when the page opens
        loadPayments();
    </script>
</body>

</html>
