<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login — BSSMAI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <!-- Top Navigation -->
    <div class="login-nav">
        <a href="index.html" class="login-back-btn">
            <svg fill="currentColor" width="20" height="20" viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
            </svg>
            Back to Home
        </a>
    </div>

    <!-- Center Card -->
    <div class="login-wrapper">
        <div class="login-card">

            <!-- Logo & Title -->
            <div class="login-header">
                <div class="login-logo-circle">
                    <img src="logo.png" alt="BSSMAI Logo" class="login-logo-img">
                </div>
                <h1 class="login-title">Employee Login</h1>
                <p class="login-subtitle">Enter your credentials to access the system</p>
            </div>

            <div id="alert" class="alert"></div>

            <form id="employeeLoginForm" class="login-form">
                <div class="login-fields">

                    <!-- Username -->
                    <div class="login-field">
                        <label class="login-label">Username</label>
                        <input type="text" id="username" name="username"
                            placeholder="Enter username"
                            class="login-input"
                            required autofocus>
                    </div>

                    <!-- Password -->
                    <div class="login-field">
                        <label class="login-label">Password</label>
                        <input type="password" id="password" name="password"
                            placeholder="Enter password"
                            class="login-input"
                            required>
                    </div>

                </div>

                <!-- Login Button -->
                <div class="login-actions">
                    <button type="submit" id="loginBtn" class="btn-login">Login</button>
                </div>
            </form>

        </div>
    </div>

    <script src="main.js"></script>
    <script>
        document.getElementById('employeeLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideAlert('alert');

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            setLoading('loginBtn', true, 'Login');

            try {
                const result = await apiPost('api/registrar.php?action=login', { username, password });

                sessionStorage.setItem('registrarLoggedIn', 'yes');
                sessionStorage.setItem('registrarUser', username);
                sessionStorage.setItem('adminId', result.id);
                sessionStorage.setItem('userRole', result.role);

                if (result.role === 'cashier') {
                    window.location.href = 'cashier-dashboard.html';
                } else if (result.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'registrar-dashboard.html';
                }

            } catch (err) {
                showAlert('alert', '❌ ' + err.message);
                setLoading('loginBtn', false, 'Login');
            }
        });
    </script>
</body>

</html>
